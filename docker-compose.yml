services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - sendblast

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: node src/workers/sender.js
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - sendblast

  frontend:
    image: nginx:alpine
    ports:
      - "3001:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - sendblast

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - sendblast

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sendblast
      POSTGRES_USER: sendblast
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sendblast123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped
    networks:
      - sendblast

networks:
  sendblast:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
